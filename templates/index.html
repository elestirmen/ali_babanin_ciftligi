{% extends "base.html" %}

{% block title %}Admin Harita - Ali Baba'nın Çiftliği{% endblock %}

{% block content %}
<div class="map-page">
    <div id="map"></div>

    <div class="map-summary" id="mapSummary" aria-live="polite">

            <a href="{{ url_for('swarm_new') }}" role="menuitem">🏕️ Yeni Oğul Kovanı</a>
            <a href="{{ url_for('swarm_cluster_new') }}" role="menuitem">📍 Yeni Oğul Noktası</a>

        </div>
    </div>
</div>
{% endblock %}

{% block extra_scripts %}
<script src="{{ url_for('static', filename='js/map.js', v=asset_version) }}"></script>
{% endblock %}
