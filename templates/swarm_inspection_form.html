{% extends "base.html" %}

{% block title %}Yeni Oğul Kontrolü - {{ hive.ad }} - Ali Baba'nın Çiftliği{% endblock %}

{% block content %}
<div class="container">
    <a href="{{ url_for('swarm_detail', id=hive.id) }}" class="back-link">← {{ hive.ad }}</a>

    <div class="page-header">
        <div>
            <h1>📋 Yeni Oğul Kontrolü</h1>
            <div class="subtitle">{{ hive.ad }} • Oğul Kovanı</div>
        </div>
    </div>

    <div class="card">
        <div class="card-body">
            <form method="POST" enctype="multipart/form-data">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

                <div class="form-row">
                    <div class="form-group">
                        <label for="kontrol_tarihi">Kontrol Tarihi</label>
                        <input type="date" id="kontrol_tarihi" name="kontrol_tarihi" class="form-control"
                               value="{{ now.strftime('%Y-%m-%d') }}">
                    </div>
                    <div class="form-group">
                        <label for="durum">Gözlenen Durum</label>
                        <select id="durum" name="durum" class="form-control">
                            {% for status in statuses %}
                                <option value="{{ status }}" {% if status == hive.durum %}selected{% endif %}>{{ status }}</option>
                            {% endfor %}
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label for="ari_gelis_tarihi">Arı Geliş Tarihi</label>
                    <input type="date" id="ari_gelis_tarihi" name="ari_gelis_tarihi" class="form-control">
                    <div class="hint">Arının geldiği günü kesin biliyorsanız doldurun; bilmiyorsanız boş bırakın.</div>
                </div>

                <div class="form-group">
                    <label for="notlar">Notlar</label>
                    <textarea id="notlar" name="notlar" class="form-control"
                              placeholder="Arı hareketi, yoğunluk, çevre gözlemi..."></textarea>
                </div>

                <div class="form-group">
                    <label for="fotograf">Fotoğraf</label>
                    <div class="file-input-wrapper">
                        <input type="file" id="fotograf" name="fotograf" accept=".jpg,.jpeg,.png,.webp">
                    </div>
                </div>

                <hr class="divider">

                <div class="btn-group">
                    <button type="submit" class="btn btn-primary btn-lg" style="flex:1;">✅ Kontrol Kaydını Ekle</button>
                    <a href="{{ url_for('swarm_detail', id=hive.id) }}" class="btn btn-outline btn-lg">İptal</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
